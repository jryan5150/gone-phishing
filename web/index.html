<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexcom IRP Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
    background: #0a0f1a; color: #cbd5e1; height: 100vh;
    display: flex; flex-direction: column;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid #1e293b;
    background: linear-gradient(180deg, #0f172a, #0a0f1a);
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; font-weight: 800; color: #0a0f1a;
  }
  .logo-text { font-size: 0.95rem; font-weight: 700; color: #e2e8f0; }
  .logo-sub { font-size: 0.7rem; color: #475569; }
  .messages {
    flex: 1; overflow-y: auto; padding: 16px;
  }
  .message { margin-bottom: 16px; padding: 14px 16px; border-radius: 10px; }
  .message.user {
    background: #1e293b; max-width: 85%; margin-left: auto;
    padding: 10px 14px;
  }
  .message.assistant {
    background: #0f172a; border: 1px solid #1e293b;
  }
  .message h1 { font-size: 1.3rem; color: #e2e8f0; margin: 16px 0 8px; border-bottom: 1px solid #334155; padding-bottom: 4px; }
  .message h2 { font-size: 1.1rem; color: #cbd5e1; margin: 12px 0 6px; }
  .message h3 { font-size: 1rem; color: #94a3b8; margin: 10px 0 4px; }
  .message p { margin: 4px 0; line-height: 1.5; }
  .message strong { color: #e2e8f0; }
  .message code {
    background: #1e293b; padding: 2px 5px; border-radius: 3px;
    font-size: 0.9em; color: #f59e0b;
  }
  .message ul, .message ol { padding-left: 20px; }
  .message li { padding: 2px 0; line-height: 1.5; }
  .quick-actions {
    display: flex; flex-direction: column; gap: 8px; padding: 20px 0;
  }
  .quick-btn {
    padding: 10px 14px; border-radius: 8px; border: 1px solid #1e293b;
    background: #0f172a; color: #94a3b8; cursor: pointer;
    text-align: left; font-size: 0.85rem; font-weight: 500;
    transition: all 0.15s ease;
  }
  .quick-btn:hover { border-color: #f59e0b; color: #e2e8f0; }
  .input-area {
    padding: 12px 16px; border-top: 1px solid #1e293b; background: #0f172a;
  }
  .input-wrap {
    display: flex; gap: 8px; align-items: flex-end;
    background: #1e293b; border-radius: 10px; padding: 8px 12px;
    border: 1px solid #334155;
  }
  .input-wrap textarea {
    flex: 1; background: transparent; border: none; outline: none;
    color: #e2e8f0; font-size: 0.9rem; resize: none; font-family: inherit;
    line-height: 1.5; padding: 4px 0;
  }
  .input-wrap textarea::placeholder { color: #475569; }
  .send-btn {
    padding: 6px 16px; border-radius: 6px; border: none; cursor: pointer;
    background: #f59e0b; color: #0a0f1a; font-weight: 700; font-size: 0.8rem;
    transition: all 0.15s ease; flex-shrink: 0;
  }
  .send-btn:disabled { background: #334155; color: #64748b; cursor: default; }
  .loading {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 16px; background: #0f172a; border: 1px solid #1e293b; border-radius: 10px;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%; background: #f59e0b;
    animation: pulse 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
  .status { font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; }
  .status.online { background: #22c55e20; color: #22c55e; border: 1px solid #22c55e30; }
  .status.offline { background: #ef444420; color: #ef4444; border: 1px solid #ef444430; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">IR</div>
    <div>
      <div class="logo-text">Lexcom IRP Assistant</div>
      <div class="logo-sub">NIST 800-61 Aligned</div>
    </div>
  </div>
  <span id="status" class="status offline">checking...</span>
</div>

<div class="messages" id="messages">
  <div style="padding: 20px 0">
    <div style="font-size: 1.1rem; font-weight: 700; color: #e2e8f0; margin-bottom: 4px">
      Report an incident
    </div>
    <div style="font-size: 0.85rem; color: #475569; margin-bottom: 20px">
      Describe what happened and I'll generate an actionable response plan.
    </div>
    <div class="quick-actions" id="quickActions">
      <button class="quick-btn" onclick="send('A user reported they clicked a link in a suspicious email and entered their Microsoft 365 credentials on a spoofed login page.')">Phishing — user clicked link</button>
      <button class="quick-btn" onclick="send('Multiple users report encrypted files with ransom notes on three workstations. File extensions changed to .encrypted across the shared drive.')">Ransomware detected</button>
      <button class="quick-btn" onclick="send('SIEM flagged 2GB data exfiltration to external IP overnight from database server containing customer PII.')">Suspected data breach</button>
      <button class="quick-btn" onclick="send('Finance processed an $85,000 wire transfer 30 minutes ago based on a fraudulent email appearing to be from the CFO. The sender domain was misspelled.')">BEC — wire fraud attempt</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="input" rows="1" placeholder="Describe the incident..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()">SEND</button>
  </div>
</div>

<script>
  // Configuration — change this to your server URL
  const API_BASE = window.location.origin;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const statusEl = document.getElementById('status');
  let chatHistory = [];
  let loading = false;

  // Check server health
  async function checkHealth() {
    try {
      const res = await fetch(`${API_BASE}/api/health`);
      if (res.ok) {
        statusEl.textContent = 'online';
        statusEl.className = 'status online';
      } else throw new Error();
    } catch {
      statusEl.textContent = 'offline';
      statusEl.className = 'status offline';
    }
  }
  checkHealth();
  setInterval(checkHealth, 30000);

  function addMessage(role, content) {
    const quickActions = document.getElementById('quickActions');
    if (quickActions) quickActions.parentElement.remove();

    const div = document.createElement('div');
    div.className = `message ${role}`;

    if (role === 'assistant') {
      // Simple markdown rendering
      div.innerHTML = content
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/^- \[ \] (.+)$/gm, '<div style="display:flex;gap:8px;padding:3px 0 3px 8px"><span style="color:#f59e0b">☐</span><span>$1</span></div>')
        .replace(/^\d+\.\s(.+)$/gm, '<div style="padding:2px 0 2px 12px">$&</div>')
        .replace(/^- (.+)$/gm, '<div style="padding:2px 0 2px 12px">• $1</div>')
        .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid #1e293b;margin:12px 0">')
        .replace(/\n\n/g, '<br><br>')
        .replace(/\n/g, '<br>');
    } else {
      div.textContent = content;
    }

    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showLoading() {
    const div = document.createElement('div');
    div.className = 'loading';
    div.id = 'loadingIndicator';
    div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div><span style="font-size:0.85rem;color:#64748b">Generating action plan...</span>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideLoading() {
    const el = document.getElementById('loadingIndicator');
    if (el) el.remove();
  }

  async function send(text) {
    const msg = text || inputEl.value.trim();
    if (!msg || loading) return;

    loading = true;
    inputEl.value = '';
    sendBtn.disabled = true;

    addMessage('user', msg);
    showLoading();

    try {
      // Use the incident endpoint for first message, chat for follow-ups
      if (chatHistory.length === 0) {
        const res = await fetch(`${API_BASE}/api/incident`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ description: msg }),
        });
        const data = await res.json();
        if (data.action_plan) {
          hideLoading();
          addMessage('assistant', data.action_plan);
          chatHistory.push({ role: 'user', content: msg });
          chatHistory.push({ role: 'assistant', content: data.action_plan });
        } else {
          throw new Error(data.detail || 'No response');
        }
      } else {
        chatHistory.push({ role: 'user', content: msg });
        const res = await fetch(`${API_BASE}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: chatHistory }),
        });
        const data = await res.json();
        hideLoading();
        addMessage('assistant', data.response);
        chatHistory.push({ role: 'assistant', content: data.response });
      }
    } catch (err) {
      hideLoading();
      addMessage('assistant', `**Error:** ${err.message}\n\nIs the server running? Check ${API_BASE}/api/health`);
    } finally {
      loading = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
